
<!doctype html>
<html>
  <meta charset="utf-8" />
  <style>
    body {
      background-color: black;
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: absolute;
      margin: 0;
      padding: 0;
    }

    #player {
      height: 100%;
      width: 100%;
    }
  </style>
  <script>
    //导入YouTube 嵌入式播放器 API
    let tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    let firstScriptTag = document.getElementsByTagName("script")[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    //YouTube 嵌入式播放器 API: https://developers.google.com/youtube/iframe_api_reference?hl=zh-cn
    //OBS Studio JavaScript API: https://github.com/obsproject/obs-browser#control-obs

    //使用前为obs快捷方式添加启动参数：
    //“--disable-web-security --disable-site-isolation-trials --user-data-dir="某文件夹路径"”
    //user-data-dir可以指定任意存在的文件夹，最好是空文件夹

    let player;

    //获取参数
    const urlObj = new URL(window.location.href);
    const id = urlObj.searchParams.get("id")
      ? urlObj.searchParams.get("id").split(",").filter(Boolean)
      : [];
    const playlist = urlObj.searchParams.get("list") || null;
    let quality = urlObj.searchParams.get("quality");

    //新建嵌入式播放器
    function onYouTubeIframeAPIReady() {
      if (!window.obsstudio) {
        alert("请在OBS中打开！");
        return;
      }
      if (id.length && playlist) {
        alert(
          "暂时不支持同时指定id参数与list参数。\n只有id参数中指定的视频会播放。",
        );
      }
      if (id.length == 0 && !playlist) {
        alert("未提供视频ID，无法播放。\n请按格式正确添加id参数或list参数。");
        return;
      }
      window.obsstudio.getControlLevel(function (level) {
        if (level != 5) {
          alert(
            "权限不足，无法自动停止推流。\n请在浏览器源的属性中\n将页面权限设置为“OBS的完全访问权限”。",
          );
        }
      });

      player = new YT.Player("player", {
        videoId: "",
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0,
          fs: 0,
        },
        events: {
          //事件监听器
          onStateChange: onPlayerStateChange,
          onReady: onPlayerReady,
          onError: onPlayerError,
        },
      });
      player.index = -1;
      player.lastIndex = -2;
    }

    function onPlayerReady(event) {
      //导入播放列表
      //XXX 支持同时使用id和list参数
      event.target.iframe = document.getElementById("player"); //获取页面元素，方便操作
      injectCSS(event.target.iframe.contentDocument); //注入CSS样式
      event.target.loadPlaylist();
      if (id.length != 0) {
        setTimeout(function () {
          event.target.loadPlaylist({ playlist: id });
        }, 500);
      } else if (playlist) {
        setTimeout(function () {
          event.target.loadPlaylist({ list: playlist, listType: "playlist" });
        }, 500);
      }
      event.target.playVideo(); //开始播放
    }

    function onPlayerStateChange(event) {
      const currentIndex = event.target.getPlaylistIndex();
      console.log(
        "status:" +
          event.data +
          " current:" +
          currentIndex +
          " index:" +
          event.target.index,
      );
      if (event.data == YT.PlayerState.BUFFERING) {
        //currentIndex为-1说明列表丢失，重载列表
        if (currentIndex == -1) {
          refreshPlaylist(event.target);
        }
      } else if (event.data == YT.PlayerState.PLAYING) {
        if (currentIndex != event.target.lastIndex) {
          //仅在第一次变为PLAYING时改变画质
          event.target.lastIndex = currentIndex;
          autoChangeQuality(event.target.iframe, quality);
        }
      } else if (event.data == YT.PlayerState.UNSTARTED) {
        //隐藏UI
        setElementStyle(
          event.target.iframe.contentWindow.document,
          "player-controls",
          "opacity",
          "0",
        );
        //等待直播开始，这种情况下会丢失列表
        //记录index以便确认位置
        if (currentIndex != -1) event.target.index = currentIndex;
      } else if (event.data == YT.PlayerState.ENDED) {
        if (
          event.target.getPlaylistIndex() >=
          (event.target.getPlaylist() || []).length - 1
        )
          window.obsstudio.stopStreaming(); //如果所有视频均播放完毕，则停止推流
      }
    }

    function onPlayerError(event) {
      console.log("player error");
      console.log(event.data);
      if (event.data != 2) {
        //data为2说明参数设置错误
        //应当只在初始化时发生（新建播放器时未指定id）
        // console.log(
        //   "ID为：" +
        //     event.target.getVideoData()["video_id"] +
        //     "\n的视频无法播放。",
        // );
        if (
          event.target.getPlaylistIndex() !=
          (event.target.getPlaylist() || []).length - 1
        ) {
          event.target.nextVideo();
        } else window.obsstudio.stopStreaming(); //如果所有视频均播放完毕，则停止推流
      }
    }

    function refreshPlaylist(player) {
      if (id.length != 0) {
        player.loadPlaylist(id, player.index);
      } else if (playlist) {
        player.loadPlaylist({
          list: playlist,
          listType: "playlist",
          index: player.index,
        });
      }
      player.playVideo();
    }

    function setElementStyle(doc, id, property, value, priority = null) {
      let el = doc.getElementById(id);
      if (el) {
        if (priority) el.style.setProperty(property, value, priority);
        else el.style.setProperty(property, value);
      }
    }

    async function autoChangeQuality(iframe, quality) {
      function waitForElement(doc, selector) {
        return new Promise((resolve) => {
          if (doc.querySelector(selector)) {
            return resolve(doc.querySelector(selector));
          }
          const observer = new MutationObserver((mutations) => {
            if (doc.querySelector(selector)) {
              observer.disconnect();
              resolve(doc.querySelector(selector));
            }
          });
          observer.observe(doc, {
            childList: true,
            subtree: true,
          });
        });
      }

      function sleep(time) {
        return new Promise((resolve) => setTimeout(resolve, time));
      }

      const iframeDoc = iframe.contentWindow.document;

      setElementStyle(iframeDoc, "bottom-sheet-wrapper", "opacity", "0");

      //模拟点击按钮设置画质
      let buttonSettings = await waitForElement(
        iframeDoc,
        ".player-settings-icon",
      );

      buttonSettings.click(); //菜单只有点击对应选项后才会生成
      let menuSettings = await waitForElement(
        iframeDoc,
        "#content-wrapper",
      );

      let options = menuSettings.querySelectorAll(
        ".ytListItemViewModelTitle",
      );
      for (option of options) {
        if (option.textContent.trim() == "画质") option.click(); //菜单只有点击对应选项后才会生成
      }

      let oldInnerText = menuSettings.innerText;
      while (true) {
        menuSettings = iframeDoc.querySelector(
          "#content-wrapper",
        );
        if (menuSettings.innerText != oldInnerText) {
          options = menuSettings.querySelectorAll(
            ".ytListItemViewModelTitle",
          );
          if (
            options[options.length - 1].textContent !== undefined &&
            options[options.length - 1].textContent !== null &&
            options[options.length - 1].textContent.includes("自动")
          )
            break;
          oldInnerText = menuSettings.innerText;
        }
        await sleep(100);
      }

      if (quality == "max") {
        //参数为max，切换至最高画质，点击第一项
        options[0].click();
      } else {
        let flag = false;
        if (quality) {
          //否则遍历
          //XXX 如果选择的画质不存在则无效
          for (item of options) {
            if (
              quality == item.textContent ||
              quality == item.textContent.split("p")[0]
            ) {
              item.click();
              flag = true;
              break;
            }
          }
        }
        //遍历失败，改为自动画质
        if (!flag) options[options.length - 1].click();
      }

      await sleep(500);
      setElementStyle(iframeDoc, "player-controls", "opacity", "1");
      setElementStyle(iframeDoc, "bottom-sheet-wrapper", "opacity", "1");
    }

    async function injectCSS(doc) {
      let styleToInject = doc.createElement("style");
      styleToInject.type = "text/css";
      styleToInject.textContent =
        //无法播放时显示的错误界面
        ".ytp-error, " +
        //UI
        "#player-controls " +
        //不显示（仍然可以点击）
        "{opacity: 0;}" +
        "\n" +
        //左上角标题、频道头像等内容
        "embedded-player-video-details, " +
        //左下角稍后观看和分享
        ".action-menu-engagement-buttons-wrapper, " +
        //右下方更多视频
        ".fullscreen-watch-next-entrypoint-wrapper, " +
        //右下角“在YouTube观看”
        ".watch-on-youtube-button-wrapper, " +
        //播放器渐变特效
        ".player-controls-background-container, " +
        //待机界面按钮
        ".ytp-offline-slate-button, .ytp-offline-slate-icon, " +
        //开关字幕的提示
        ".hug-toast " +
        //隐藏
        "{display: none !important;}" +
        "\n" +
        //待机界面字号
        ".ytp-offline-slate-bar " +
        "{height: 160px !important;}" +
        "\n" +
        ".ytp-offline-slate-main-text " +
        "{font-size: 500% !important;}" +
        "\n" +
        ".ytp-offline-slate-subtitle-text " +
        "{font-size: 300% !important;}";
      doc.head.appendChild(styleToInject);
    }
  </script>

  <body>
    <div id="player"></div>
  </body>
</html>
